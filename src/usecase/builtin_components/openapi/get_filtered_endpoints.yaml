        '400':
          description: Bad request - invalid input parameters.
          content:
            application/json:
              schema:
                type: object

        '401':
          description: Unauthorized. The API key is missing or invalid.
          content:
            application/json:
              schema:
                type: object
        '402':
          description: Payment required.
          content:
            application/json:
              schema:
                type: object
        '403':
          description: Forbidden. The API key does not have the required permissions.
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    FilteredEndpointsRequest:
      type: object
      properties:
        request_data:
          $ref: '#/components/schemas/FilteredEndpointsRequestPayload'
      required:
        - request_data

    FilteredEndpointsRequestPayload:
      type: object
      properties:
        search_from:
          type: integer
          format: int32
          default: 0
          description: |
            Represents the start offset within the query result set from which you want endpoints returned.
            Endpoints are returned as a zero-based list. Any endpoint indexed less than this value is not returned in the final result set and defaults to zero.
        search_to:
          type: integer
          default: 100
          format: int32
          description: |
            Represents the end offset within the result set after which you do not want endpoints returned.
            Endpoint in the endpoint list that is indexed higher than this value is not returned in the final results set.
            Defaults to 100, which returns all endpoints to the end of the list.
        sort:
          $ref: '#/components/schemas/EndpointSort'
        filters:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/EndpointIdsListFilter'
              - $ref: '#/components/schemas/EndpointStatusFilter'
              - $ref: '#/components/schemas/DistNameFilter'
              - $ref: '#/components/schemas/FirstSeenFilter'
              - $ref: '#/components/schemas/LastSeenFilter'
              - $ref: '#/components/schemas/IpListFilter'
              - $ref: '#/components/schemas/GroupNameFilter'
              - $ref: '#/components/schemas/PlatformFilter'
              - $ref: '#/components/schemas/AliasFilter'
              - $ref: '#/components/schemas/IsolateFilter'
              - $ref: '#/components/schemas/HostnameFilter'
              - $ref: '#/components/schemas/UsernameFilter'
              - $ref: '#/components/schemas/PublicIpListFilter'
              - $ref: '#/components/schemas/ScanStatusFilter'

    EndpointSort:
      type: object
      description: Identifies the sort order for the result set.
      properties:
        field:
          type: string
          default: first_seen
          description: Identifies the field you want to sort by. Case-sensitive.
          enum: [ endpoint_id, first_seen, last_seen, scan_status ]
        keyword:
          type: string
          default: DESC
          description: Whether you want to sort in ascending (ASC) or descending (DESC) order. Case-sensitive.
          enum: [ ASC, DESC ]

    EndpointIdsListFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ endpoint_id_list ]
        value:
          type: array
          items:
            type: string
          description: List of endpoint IDs.

    EndpointStatusFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ endpoint_status ]
        value:
          type: array
          items:
            type: string
            enum: [ connected, disconnected, lost, uninstalled ]
          description: Status of the endpoint ID.

    DistNameFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ dist_name ]
        value:
          type: array
          items:
            type: string
          description: Distribution / Installation Package name.

    FirstSeenFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in, gte, lte, eq ]
        field:
          type: string
          enum: [ first_seen ]
        value:
          type: integer
          format: int32
          description: When the agent was first seen. Timestamp epoch milliseconds.

    LastSeenFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in, gte, lte, eq ]
        field:
          type: string
          enum: [ last_seen ]
        value:
          type: integer
          format: int32
          description: When the agent was last seen. Timestamp epoch milliseconds.

    IpListFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ ip_list ]
        value:
          type: array
          items:
            oneOf:
              - type: string
                format: ipv4
              - type: string
                format: ipv6
          description: List of IP addresses. For example "192.168.5.12".

    GroupNameFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ group_name ]
        value:
          type: array
          items:
            type: string
          description: Group name the agent belongs to.

    PlatformFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ platform ]
        value:
          type: array
          items:
            type: string
            enum: [ windows, linux, macos, android ]
          description: Platform name.

    AliasFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ alias ]
        value:
          type: array
          items:
            type: string
          description: Alias name.

    IsolateFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ isolate ]
        value:
          type: array
          items:
            type: string
            enum: [ isolated, unisolated ]
          description: If the endpoint was isolated.

    HostnameFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ hostname ]
        value:
          type: array
          items:
            type: string
          description: Host name.

    UsernameFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ username ]
        value:
          type: array
          items:
            type: string
          description: Username.

    PublicIpListFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ public_ip_list ]
        value:
          type: array
          items:
            oneOf:
              - type: string
                format: ipv4
              - type: string
                format: ipv6
          description: Public IP addresses that correlate to the last IPv4 address from which the XDR agent connected (known as Last Origin IP).

    ScanStatusFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [ in ]
        field:
          type: string
          enum: [ scan_status ]
        value:
          type: array
          items:
            type: string
            enum: [ none, pending, in_progress, canceled, aborted, pending_cancellation, success, error ]
          description: Scan status of the endpoint.