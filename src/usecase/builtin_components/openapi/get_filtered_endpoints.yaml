openapi: 3.0.0
paths:
  /public_api/v1/endpoints/get_endpoint/:
    post:
      summary: Get endpoints filtered by endpoint
      description: This tool is used to retrieve a filtered list of endpoints managed by the XDR agents based on their ids, status and platform.
      operationId: get_filtered_endpoints
      tags:
        - Endpoints
      requestBody:
        description: JSON object containing filters. An empty request_data object returns all results.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilteredEndpointsRequest'
            examples:
              filtered_request:
                summary: Example request with filters
                value:
                  request_data:
                    filters:
                      - field: "platform"
                        operator: "in"
                        value: [ "windows", "linux", "macos" ]
                      - field: "endpoint_status"
                        operator: "in"
                        value: [ "connected", "disconnected" ]
      responses:
        '200':
          description: Successful response containing a list of agents that match the given filters.
          content:
            application/json:
              schema:
                type: object
              examples:
                success_response:
                  summary: Example successful response
                  value:
                    reply:
                      total_count: 2
                      result_count: 2
                      endpoints:
                        - endpoint_id: "1a2b3c4d5e6f7g8h9i0j"
                          endpoint_name: "DESKTOP-ABC123"
                          endpointTags: "production,critical"
                          endpoint_type: "AGENT_TYPE_WORKSTATION"
                          endpoint_status: "connected"
                          os_type: "windows"
                          os_version: "Windows 10 Pro"
                          ip: ["192.168.1.100", "10.0.0.5"]
                          ipv6: ["fe80::1"]
                          public_ip: "203.0.113.10"
                          users: ["john.doe", "admin"]
                          domain: "CORP"
                          alias: "John's Workstation"
                          first_seen: 1704067200000
                          last_seen: 1704153600000
                          content_version: "350-98765"
                          installation_package: "Windows Agent 7.9.0"
                          active_directory: {"domain": "corp.example.com"}
                          install_date: 1704067200000
                          endpoint_version: "7.9.0.12345"
                          is_isolated: "unisolated"
                          isolated_date: null
                          group_name: ["Production Servers", "Critical Assets"]
                          operational_status: "OPERATIONAL"
                          operational_status_description: "Endpoint is fully operational"
                          scan_status: "success"
                          content_release_timestamp: 1704153600000
                          last_content_update_time: 1704153600000
                          content_status: "UP_TO_DATE"
                          operating_system: "Windows 10 Pro 64-bit"
                          mac_address: ["00:1A:2B:3C:4D:5E"]
                          assigned_prevention_policy: "Standard Prevention"
                          assigned_extensions_policy: "Standard Extensions"
                        - endpoint_id: "9z8y7x6w5v4u3t2s1r0q"
                          endpoint_name: "LAPTOP-XYZ789"
                          endpointTags: "remote,laptop"
                          endpoint_type: "AGENT_TYPE_LAPTOP"
                          endpoint_status: "disconnected"
                          os_type: "macos"
                          os_version: "macOS 14.0"
                          ip: ["10.0.0.50"]
                          ipv6: []
                          public_ip: "198.51.100.25"
                          users: ["jane.smith"]
                          domain: "CORP"
                          alias: "Jane's MacBook"
                          first_seen: 1704240000000
                          last_seen: 1704326400000
                          content_version: "350-98766"
                          installation_package: "macOS Agent 7.9.0"
                          active_directory: null
                          install_date: 1704240000000
                          endpoint_version: "7.9.0.12345"
                          is_isolated: "unisolated"
                          isolated_date: null
                          group_name: ["Remote Workers"]
                          operational_status: "DISCONNECTED"
                          operational_status_description: "Endpoint has not connected recently"
                          scan_status: "none"
                          content_release_timestamp: 1704326400000
                          last_content_update_time: 1704326400000
                          content_status: "UP_TO_DATE"
