version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python-patch-minor:
        update-types:
          - patch
          - minor
        patterns:
          - "*"
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions-patch-minor:
        update-types:
          - patch
          - minor
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
