name: Feature request
description: Propose a new capability
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or security problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication
        - Authorization
        - XQL/log search
        - XSIAM API coverage
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: How should this be constrained, audited, or tested?
    validations:
      required: true
