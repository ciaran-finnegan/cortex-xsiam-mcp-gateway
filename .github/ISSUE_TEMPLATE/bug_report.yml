name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use private vulnerability reporting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, transport, deployment mode.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove secrets and tenant-specific data.
      render: text
