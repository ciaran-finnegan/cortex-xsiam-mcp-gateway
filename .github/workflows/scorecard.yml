name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 4 * * 3"
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  scorecard:
    name: scorecard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          publish_results: true
